name: Build & Distribute APK

# Triggers:
#   - Every push to main (post-merge)
#   - Every push to any feat/* branch (active development)
#   - Manual trigger from GitHub Actions tab (Actions → Build & Distribute APK → Run workflow)
on:
  push:
    branches:
      - main
      - 'feat/**'
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        # The shared debug.keystore is committed to the repo so the APK is
        # signed consistently — Android treats each CI build as an update, not a reinstall.
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install -g firebase-tools
          echo "$FIREBASE_SA_JSON" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase appdistribution:distribute \
            app/build/outputs/apk/debug/app-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --testers "chrisjmendoza@gmail.com" \
            --release-notes "Branch: ${{ github.ref_name }} | ${{ github.event.head_commit.message }}"
          rm /tmp/sa.json
